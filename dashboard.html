<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Kahua</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png" />
  <link rel="icon" href="img/favicon.ico" />
  <style>
    .plano-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 100px;
      position: relative;
    }
    .plano-wrap img.plano {
      max-width: 100%;
      height: auto;
      border-radius: var(--kahua-radius);
      box-shadow: var(--kahua-sombra);
    }
    .marca-agua {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 340px;
      height: 340px;
      opacity: 0.12;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <header class="app-header">
    <img src="img/logo.png" alt="Kahua" />
    <h1>Kahua</h1>
  </header>

  <div class="container">
    <nav class="tabs">
      <a href="dashboard.html" class="activo">Dashboard</a>
      <a href="inventario.html">Inventario</a>
      <a href="productos.html">Productos</a>
      <a href="recetas.html">Recetas</a>
      <a href="proveedores.html">Proveedores</a>
      <a href="pedidos-proveedor.html">Pedidos</a>
      <a href="registro-tarjeta.html">Tarjeta</a>
      <a href="reportes.html">Reportes</a>
      <a href="movimientos.html">Movimientos</a>
      <a href="usuarios.html">Usuarios</a>
    </nav>

    <div class="card plano-wrap">
      <img class="plano" src="img/plano-cafeteria.png" alt="Plano de la cafetería Kahua" />
      <img class="marca-agua" src="img/logo.png" alt="" />
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
</body>
</html>
