<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario | Kahua</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png" />
  <link rel="icon" href="img/favicon.ico" />
</head>
<body>

  <header class="app-header">
    <img src="img/logo.png" alt="Kahua" />
    <h1>Kahua</h1>
  </header>

  <div class="container">
    <nav class="tabs">
      <a href="dashboard.html">Dashboard</a>
      <a href="inventario.html" class="activo">Inventario</a>
      <a href="productos.html">Productos</a>
      <a href="recetas.html">Recetas</a>
      <a href="proveedores.html">Proveedores</a>
      <a href="pedidos-proveedor.html">Pedidos</a>
      <a href="registro-tarjeta.html">Tarjeta</a>
      <a href="reportes.html">Reportes</a>
      <a href="movimientos.html">Movimientos</a>
      <a href="usuarios.html">Usuarios</a>
    </nav>

    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <strong id="total-insumos">0</strong> insumos ·
        <span id="total-stock-bajo" style="color:var(--kahua-rojo);"></span>
      </div>
      <button class="btn btn-primary" id="btn-nuevo-insumo">+ Nuevo insumo</button>
    </div>

    <div class="card" style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
      <input type="text" id="f-buscar" placeholder="Buscar insumo..." style="flex:1; min-width:180px; padding:8px;" />

      <select id="f-filtro-categoria" style="padding:8px;">
        <option value="">Todas las categorías</option>
      </select>

      <select id="f-filtro-proveedor" style="padding:8px;">
        <option value="">Todos los proveedores</option>
      </select>

      <select id="f-filtro-stock" style="padding:8px;">
        <option value="">Todo el stock</option>
        <option value="bajo">Solo stock bajo</option>
        <option value="ok">Solo stock OK</option>
      </select>

      <button class="btn" id="btn-limpiar-filtros" style="background:#eee;">Limpiar</button>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Insumo</th>
            <th>Categoría</th>
            <th>Stock</th>
            <th>Stock mínimo</th>
            <th>Costo unitario</th>
            <th>Proveedor</th>
            <th>Estado</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tabla-inventario-body">
          <tr><td colspan="8">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal simple para crear/editar insumo -->
  <div id="modal-insumo" style="display:none; position:fixed; inset:0; background:rgba(27,59,51,0.4); align-items:center; justify-content:center;">
    <div class="card" style="width:100%; max-width:420px;">
      <h3 id="modal-titulo" style="margin-top:0;">Nuevo insumo</h3>
      <form id="form-insumo">
        <input type="hidden" id="f-id-insumo" />

        <label>Nombre del insumo</label>
        <input type="text" id="f-nombre" required style="width:100%; padding:8px; margin-bottom:10px;" />

        <label>Categoría</label>
        <select id="f-categoria" style="width:100%; padding:8px; margin-bottom:10px;"></select>

        <label>Unidad de medida</label>
        <select id="f-unidad" style="width:100%; padding:8px; margin-bottom:10px;">
          <option value="g">g (gramos)</option>
          <option value="kg">kg (kilogramos)</option>
          <option value="lb">lb (libras)</option>
          <option value="ml">ml (mililitros)</option>
          <option value="l">l (litros)</option>
          <option value="unidad">unidad</option>
        </select>

        <label>Stock actual</label>
        <input type="number" id="f-stock-actual" step="0.01" style="width:100%; padding:8px; margin-bottom:10px;" />

        <label>Stock mínimo</label>
        <input type="number" id="f-stock-minimo" step="0.01" style="width:100%; padding:8px; margin-bottom:10px;" />

        <label>Costo unitario (USD)</label>
        <input type="number" id="f-costo" step="0.01" style="width:100%; padding:8px; margin-bottom:10px;" />

        <label>Proveedor</label>
        <select id="f-proveedor" style="width:100%; padding:8px; margin-bottom:16px;"></select>

        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button type="button" class="btn" id="btn-cancelar" style="background:#eee;">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btn-guardar-insumo">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/inventario.js"></script>
</body>
</html>
